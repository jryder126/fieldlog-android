name: Build APK

# Builds the app on GitHub's servers (which have the Android SDK) and
# publishes the APK so you can download it from a link.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:        # lets you trigger a build manually from the Actions tab

permissions:
  contents: write           # needed to publish the APK to a Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the project
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      # Download from the Actions run (Artifacts section) — kept ~90 days.
      - name: Upload APK as a build artifact
        uses: actions/upload-artifact@v7
        with:
          name: fieldlog-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      # Permanent download link: github.com/<you>/<repo>/releases/latest
      - name: Publish APK to the "latest" release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest Fieldlog build
          body: "Debug APK built automatically. Download app-debug.apk below and install on your phone."
          files: app/build/outputs/apk/debug/app-debug.apk
